# literature.sanatanadharma.cloud — ISRC Literature App
# This file is added to isrc-modern nginx container

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name literature.sanatanadharma.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name literature.sanatanadharma.cloud;

    ssl_certificate     /etc/letsencrypt/live/literature.sanatanadharma.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/literature.sanatanadharma.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=30s;

    # API routes → literature API server
    location /api/ {
        set $lit_api http://isrc-literature-app-api-1:8000;
        proxy_pass $lit_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Wagtail admin → literature API server
    location /admin/ {
        set $lit_api http://isrc-literature-app-api-1:8000;
        proxy_pass $lit_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files from API (Wagtail admin assets)
    location /static/ {
        set $lit_api http://isrc-literature-app-api-1:8000;
        proxy_pass $lit_api;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js web app
    location / {
        set $lit_web http://isrc-literature-app-web-1:3000;
        proxy_pass $lit_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
