# Shared nginx (mounted at /etc/nginx/conf.d/default.conf in isrc-modern-nginx-1)
# Listens on container :80 (mapped to host :8088), reachable in tailnet as <user>-laptop:8088.
# Serves both isrc-modern (catch-all) and isrc-literature-app (named hosts).

# ---- isrc-modern (catch-all default) ----
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 20M;

    location /static/ {
        alias /app/static/;
        expires 1d;
    }

    location /media/ {
        proxy_pass https://www.sriramchandra.in/media/;
        proxy_set_header Host www.sriramchandra.in;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_valid 200 1h;
    }

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

# ---- isrc-literature-app: web (Next.js) ----
server {
    listen 80;
    server_name isrc-literature.sanatanadharma.cloud;
    client_max_body_size 50M;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream http://isrc-literature-web:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---- isrc-literature-app: api (Django + Wagtail admin) ----
server {
    listen 80;
    server_name api.isrc-literature.sanatanadharma.cloud;
    client_max_body_size 50M;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream http://isrc-literature-api:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
