# Production deployment (Hostinger)
# literature.sanatanadharma.cloud

services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    env_file: .env.prod
    networks:
      - default
      - shared
    volumes:
      - api_static:/app/staticfiles
      - api_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_superuser &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  frontend:
    build:
      context: ./frontend-server
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      - API_SERVER_URL=http://api:8000
    volumes:
      - frontend_static:/app/staticfiles
    depends_on:
      - api
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 2 --timeout 60"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: https://literature.sanatanadharma.cloud
    networks:
      - default
      - shared
    depends_on:
      - api
    restart: always

networks:
  default:
  shared:
    external: true
    name: isrc-shared

volumes:
  postgres_data:
  api_static:
  api_media:
  frontend_static:
